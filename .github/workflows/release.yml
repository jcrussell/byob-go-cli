name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-decisions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Install bd
        run: |
          # bd is a Go binary; download the latest release.
          # Replace with a pinned version when the template is used for
          # real. See https://github.com/gastownhall/beads for install
          # instructions.
          curl -fsSL https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Initialize an empty beads database
        run: |
          rm -rf .beads/embeddeddolt .beads/last-touched .beads/interactions.jsonl .beads/metadata.json
          # --skip-agents: byob ships its own CLAUDE.md; do not
          # mutate it during the release build.
          BD_NON_INTERACTIVE=1 bd init --prefix byob --skip-agents

      - name: Build release JSONL from markdown source
        run: |
          # decisions/ + memories/ are the source of truth. Load them into
          # the empty DB and export a fresh .beads/issues.jsonl to upload.
          make import
          make export
          make check

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .beads/issues.jsonl
          fail_on_unmatched_files: true
          generate_release_notes: true
